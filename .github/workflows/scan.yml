name: Breakage Radar

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run breakage radar action
        uses: ./
        with:
          base-ref: origin/main
          format: text
          fail-on: none
